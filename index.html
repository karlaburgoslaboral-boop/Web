<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diseño 4K&M | Murales y Lettering Coruña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Permanent+Marker&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: #ffffff; margin: 0; padding-bottom: 60px; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gallery-item { position: relative; overflow: hidden; border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.1); background-color: #111; aspect-ratio: 1/1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .whatsapp-btn { background-color: #25D366; color: white; font-weight: bold; }
    </style>
</head>
<body class="antialiased">
    <header class="py-12 px-6 text-center">
        <div class="mb-4 inline-block relative">
            <div class="w-20 h-20 rounded-full bg-white flex items-center justify-center text-black text-2xl marker-font shadow-xl">4K</div>
            <div class="absolute -top-1 -right-1 w-6 h-6 bg-blue-500 rounded-full border-4 border-black flex items-center justify-center">
                <i class="fas fa-check text-[10px] text-white"></i>
            </div>
        </div>
        <h1 class="text-2xl font-bold marker-font text-white">@soydiseno4k&m</h1>
        <p class="text-zinc-400 text-xs mt-2 italic tracking-wide">Murales e Ilustración Gourmet • La Coruña</p>
    </header>

    <section class="px-6 max-w-md mx-auto mb-10">
        <div class="grid grid-cols-2 gap-3">
            <div class="gallery-item col-span-2 h-72">
                <img src="Foto1.jpg.heic" alt="[Imagen de Pizarra Desayunos]">
                <div class="absolute bottom-3 left-3 bg-black/70 px-2 py-1 rounded text-[10px] font-bold tracking-widest uppercase">Pizarras</div>
            </div>
            <div class="gallery-item">
                <img src="Foto2.jpg.heic" alt="[Imagen de Pizarra Menú]">
            </div>
            <div class="gallery-item">
                <img src="Foto3.jpg.heic" alt="[Imagen de Lettering Office]">
            </div>
            <div class="gallery-item col-span-2 h-64">
                <img src="Foto4.jpg.HEIC" alt="[Imagen de Mural El Café Ayuda]">
                <div class="absolute bottom-3 left-3 bg-black/70 px-2 py-1 rounded text-[10px] font-bold tracking-widest uppercase">Murales</div>
            </div>
        </div>
    </section>

    <section class="px-6 max-w-md mx-auto mb-10">
        <div class="glass-card rounded-3xl p-6 border-white/5">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h4 class="text-sm font-bold uppercase text-white tracking-tight">Pizarras Gastro</h4>
                    <p class="text-[10px] text-zinc-500 italic">Lettering e Ilustración</p>
                </div>
                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/20">Desde 45€</span>
            </div>
            <div class="flex justify-between items-center">
                <div>
                    <h4 class="text-sm font-bold uppercase text-white tracking-tight">Murales de Pared</h4>
                    <p class="text-[10px] text-zinc-500 italic">Diseño por m²</p>
                </div>
                <span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs font-bold border border-blue-500/20">Desde 60€/m²</span>
            </div>
        </div>
    </section>

    <section class="px-6 max-w-md mx-auto space-y-4 pb-12">
        <a href="https://wa.me/34612506927?text=Hola!%20Vengo%20de%20tu%20web%20en%20Coruña.%20Me%20interesa%20un%20presupuesto." 
           class="whatsapp-btn w-full p-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg active:scale-95 transition-transform">
            <i class="fab fa-whatsapp text-2xl"></i> Presupuesto WhatsApp
        </a>
        <a href="https://www.instagram.com/soydiseno4k%26m/" target="_blank" class="w-full p-4 rounded-2xl glass-card flex items-center justify-center gap-3 font-bold text-zinc-300 active:scale-95 transition-transform">
            <i class="fab fa-instagram text-xl"></i> Ver Instagram
        </a>
    </section>

    <footer class="text-center opacity-20 text-[8px] font-bold tracking-[0.4em] uppercase pb-8">
        Coruña • Arte Hecho a Mano • 2024
    </footer>
</body>
</html>
